name: Build

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RESTIC_IMAGE: restic/restic
  RESTIC_TAG: 0.18.1
  RESTIC_DIGEST: sha256:39d9072fb5651c80d75c7a811612eb60b4c06b32ffe87c2e9f3c7222e1797e76

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ vars.IMAGE_REPOSITORY }}
          tags: |
            type=raw,priority=1000,value=latest
            type=semver,pattern={{version}},value=${{ env.RESTIC_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RESTIC_TAG }}
            type=semver,pattern={{major}},value=${{ env.RESTIC_TAG }}
          labels: |
            maintainer=gabe565
            org.opencontainers.image.vendor=gabe565

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: ${{ github.ref_name == 'main' }}
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RESTIC_TAG=${{ env.RESTIC_TAG }}@${{ env.RESTIC_DIGEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
