name: Build

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RESTIC_IMAGE: ghcr.io/restic/restic
  RESTIC_TAG: 0.18.1@sha256:c1958a2a1c8614f5c317347c2aaddd9f426076f0521430b55509eba43d7516ee

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/gabe565/restic
          tags: |
            type=raw,priority=1000,value=latest
            type=semver,pattern={{version}},value=${{ env.RESTIC_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RESTIC_TAG }}
            type=semver,pattern={{major}},value=${{ env.RESTIC_TAG }}
          labels: |
            maintainer=gabe565
            org.opencontainers.image.vendor=gabe565

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          pull: true
          push: ${{ github.ref_name == 'main' }}
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RESTIC_TAG=${{ env.RESTIC_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
